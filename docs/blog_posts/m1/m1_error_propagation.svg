<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="460" viewBox="0 0 1600 460">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 18px Arial, sans-serif; }
      .stageTitle { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .cardTitle { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .cardText { fill: #334155; font: 500 14px Arial, sans-serif; }
      .noteText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .stepNum { fill: #ffffff; font: 700 15px Arial, sans-serif; }
      .arrowRed { stroke: #dc2626; stroke-width: 2.5; fill: none; marker-end: url(#redHead); }
      .arrowGreen { stroke: #16a34a; stroke-width: 2.5; fill: none; marker-end: url(#greenHead); }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="redHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="greenHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="460"/>

  <text class="title" x="800" y="46" text-anchor="middle">Error Propagation Chain</text>
  <text class="subtitle" x="800" y="74" text-anchor="middle">Errors flow left to right &#8212; each layer adds structure, categorization, and safety</text>

  <!-- Main flow row -->
  <rect x="80" y="100" width="1440" height="260" rx="18" fill="#fef2f2" stroke="#fecaca"/>
  <rect x="80" y="100" width="260" height="40" rx="12" fill="#dc2626"/>
  <text class="stageTitle" x="110" y="126">Error Flow</text>

  <!-- Step 1: Backend -->
  <rect x="110" y="160" width="240" height="178" rx="14" fill="#fee2e2" stroke="#fecaca"/>
  <circle cx="134" cy="186" r="14" fill="#dc2626"/>
  <text class="stepNum" x="134" y="191" text-anchor="middle">1</text>
  <text class="cardTitle" x="155" y="186">Inference Backend</text>
  <text class="cardText" x="120" y="218">HTTP call fails</text>
  <text class="cardText" x="120" y="242">Categorize status code</text>
  <text class="cardText" x="120" y="266">Retry if transient</text>
  <text class="cardText" x="120" y="290">(429, 5xx, timeout)</text>
  <text class="cardText" x="120" y="318">raise InferenceError</text>

  <!-- Step 2: Orchestrator -->
  <rect x="410" y="160" width="240" height="178" rx="14" fill="#fee2e2" stroke="#fecaca"/>
  <circle cx="434" cy="186" r="14" fill="#dc2626"/>
  <text class="stepNum" x="434" y="191" text-anchor="middle">2</text>
  <text class="cardTitle" x="455" y="186">Orchestrator</text>
  <text class="cardText" x="420" y="218">catch InferenceError</text>
  <text class="cardText" x="420" y="242">Map category to text</text>
  <text class="cardText" x="420" y="266">"config issue" /</text>
  <text class="cardText" x="420" y="290">"rate limited" /</text>
  <text class="cardText" x="420" y="314">"timed out" / ...</text>
  <text class="cardText" x="420" y="338">return RichResponse</text>

  <!-- Step 3: Connector error check -->
  <rect x="710" y="160" width="240" height="178" rx="14" fill="#fee2e2" stroke="#fecaca"/>
  <circle cx="734" cy="186" r="14" fill="#dc2626"/>
  <text class="stepNum" x="734" y="191" text-anchor="middle">3</text>
  <text class="cardTitle" x="755" y="186">Connector</text>
  <text class="cardText" x="720" y="218">Detect error phrases</text>
  <text class="cardText" x="720" y="242">in response blocks</text>
  <text class="cardText" x="720" y="270">Check rate limiter:</text>
  <text class="cardText" x="720" y="294">3 errors / 60s max</text>
  <text class="cardText" x="720" y="322">if exceeded: suppress</text>

  <!-- Step 4a: Send to user -->
  <rect x="1010" y="160" width="220" height="80" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
  <circle cx="1034" cy="186" r="14" fill="#16a34a"/>
  <text class="stepNum" x="1034" y="191" text-anchor="middle">4a</text>
  <text class="cardTitle" x="1058" y="186">Send to User</text>
  <text class="cardText" x="1020" y="218">Render error text</text>
  <text class="cardText" x="1020" y="234">as Block Kit message</text>

  <!-- Step 4b: Suppress -->
  <rect x="1010" y="268" width="220" height="70" rx="14" fill="#fef9c3" stroke="#fde68a"/>
  <circle cx="1034" cy="290" r="14" fill="#ca8a04"/>
  <text class="stepNum" x="1034" y="295" text-anchor="middle">4b</text>
  <text class="cardTitle" x="1058" y="290">Suppress</text>
  <text class="cardText" x="1020" y="316">Delete thinking msg</text>
  <text class="cardText" x="1020" y="332">silently</text>

  <!-- Step 5: Logs -->
  <rect x="1290" y="160" width="200" height="178" rx="14" fill="#fff7ed" stroke="#fdba74"/>
  <text class="cardTitle" x="1390" y="194" text-anchor="middle">Structured Logs</text>
  <text class="cardText" x="1300" y="222">request_id</text>
  <text class="cardText" x="1300" y="242">error_category</text>
  <text class="cardText" x="1300" y="262">latency_ms</text>
  <text class="cardText" x="1300" y="282">stack trace</text>
  <text class="cardText" x="1300" y="310">(always emitted,</text>
  <text class="cardText" x="1300" y="328">every error path)</text>

  <!-- Arrows -->
  <path class="arrowRed" d="M350 248 L410 248"/>
  <path class="arrowRed" d="M650 248 L710 248"/>
  <path class="arrowGreen" d="M950 200 L1010 200"/>
  <path class="arrowRed" d="M950 303 L1010 303"/>
  <path class="arrow" d="M1230 200 L1290 200"/>
  <path class="arrow" d="M1230 303 L1290 303"/>

  <!-- Bottom note -->
  <rect x="80" y="388" width="1440" height="48" rx="18" fill="#e2e8f0"/>
  <text class="noteText" x="800" y="408" text-anchor="middle">The user never sees a traceback. The logs always get the full detail. The rate limiter prevents error spam.</text>
  <text class="noteText" x="800" y="428" text-anchor="middle">Auth errors (401/403) are never retried. Rate limits (429) honour Retry-After. Timeouts and 5xx get exponential backoff + jitter.</text>
</svg>
