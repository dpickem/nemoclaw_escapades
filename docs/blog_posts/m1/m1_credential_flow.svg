<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 18px Arial, sans-serif; }
      .stageTitle { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .cardTitle { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .cardText { fill: #334155; font: 500 14px Arial, sans-serif; }
      .codeText { fill: #475569; font: 500 13px 'Courier New', monospace; }
      .noteText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#blueHead); }
      .arrowPurple { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#purpleHead); }
      .arrowGreen { stroke: #16a34a; stroke-width: 2.5; fill: none; marker-end: url(#greenHead); }
      .labelBlue { fill: #2563eb; font: 600 13px Arial, sans-serif; }
      .labelPurple { fill: #7c3aed; font: 600 13px Arial, sans-serif; }
      .labelGreen { fill: #16a34a; font: 600 13px Arial, sans-serif; }
    </style>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="blueHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="purpleHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="greenHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="620"/>

  <text class="title" x="800" y="46" text-anchor="middle">Credential Flow in the OpenShell Sandbox</text>
  <text class="subtitle" x="800" y="74" text-anchor="middle">The app never sees real secrets &#8212; proxies resolve opaque placeholders at the network boundary</text>

  <!-- Row 1: Slack credential path -->
  <rect x="80" y="100" width="1440" height="190" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="80" y="100" width="300" height="40" rx="12" fill="#2563eb"/>
  <text class="stageTitle" x="110" y="126">Slack API Credentials</text>

  <!-- App reads env -->
  <rect x="110" y="156" width="260" height="112" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="cardTitle" x="240" y="182" text-anchor="middle">App reads env</text>
  <text class="codeText" x="124" y="208">SLACK_BOT_TOKEN =</text>
  <text class="codeText" x="130" y="226">openshell:resolve:env:</text>
  <text class="codeText" x="130" y="244">SLACK_BOT_TOKEN</text>

  <!-- SDK sends request -->
  <rect x="430" y="156" width="260" height="112" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="cardTitle" x="560" y="182" text-anchor="middle">Slack SDK sends</text>
  <text class="codeText" x="444" y="208">POST slack.com/api/...</text>
  <text class="codeText" x="444" y="226">Authorization: Bearer</text>
  <text class="codeText" x="444" y="244">openshell:resolve:...</text>

  <!-- HTTPS Proxy -->
  <rect x="750" y="156" width="300" height="112" rx="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text class="cardTitle" x="900" y="182" text-anchor="middle">HTTPS Proxy (10.200.0.1)</text>
  <text class="cardText" x="764" y="208">1. Intercept request</text>
  <text class="cardText" x="764" y="228">2. Resolve placeholder to xoxb-...</text>
  <text class="cardText" x="764" y="248">3. Forward with real token</text>

  <!-- Slack API -->
  <rect x="1110" y="180" width="200" height="64" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="cardTitle" x="1210" y="218" text-anchor="middle">Slack API</text>

  <!-- Arrows -->
  <path class="arrowBlue" d="M370 212 L430 212"/>
  <path class="arrowBlue" d="M690 212 L750 212"/>
  <path class="arrowBlue" d="M1050 212 L1110 212"/>
  <text class="labelBlue" x="1060" y="204">real token</text>

  <!-- Row 2: Inference credential path -->
  <rect x="80" y="316" width="1440" height="190" rx="18" fill="#f5f3ff" stroke="#c4b5fd"/>
  <rect x="80" y="316" width="300" height="40" rx="12" fill="#7c3aed"/>
  <text class="stageTitle" x="110" y="342">Inference Credentials</text>

  <!-- App sends to inference.local -->
  <rect x="110" y="372" width="260" height="112" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="240" y="398" text-anchor="middle">App sends request</text>
  <text class="codeText" x="124" y="424">POST inference.local</text>
  <text class="codeText" x="124" y="442">/v1/chat/completions</text>
  <text class="codeText" x="124" y="460">(no Auth header)</text>

  <!-- inference.local proxy -->
  <rect x="430" y="372" width="320" height="112" rx="14" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="2"/>
  <text class="cardTitle" x="590" y="398" text-anchor="middle">inference.local Proxy</text>
  <text class="cardText" x="444" y="424">1. Look up provider config</text>
  <text class="cardText" x="444" y="444">2. Add Authorization: Bearer &#8249;key&#8250;</text>
  <text class="cardText" x="444" y="464">3. Override model name</text>

  <!-- NVIDIA API -->
  <rect x="810" y="396" width="260" height="64" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="940" y="434" text-anchor="middle">NVIDIA Inference API</text>

  <!-- Arrows -->
  <path class="arrowPurple" d="M370 428 L430 428"/>
  <path class="arrowPurple" d="M750 428 L810 428"/>
  <text class="labelPurple" x="758" y="420">real key + model</text>

  <!-- Key insight callout -->
  <rect x="80" y="534" width="1440" height="56" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
  <rect x="80" y="534" width="120" height="40" rx="12" fill="#16a34a"/>
  <text class="stageTitle" x="110" y="560">Key</text>
  <text class="noteText" x="220" y="565">The sandbox never holds a real credential. Env vars contain opaque placeholders. The proxy resolves them at the network edge when HTTP requests pass through.</text>

  <!-- Bottom note -->
  <rect x="80" y="598" width="1440" height="22" rx="10" fill="#e2e8f0"/>
  <text class="noteText" x="800" y="614" text-anchor="middle">Slack uses placeholder resolution via HTTPS proxy (tls: terminate). Inference uses the built-in inference.local proxy (no auth header needed).</text>
</svg>
