<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="906" viewBox="0 0 1600 906">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 18px Arial, sans-serif; }
      .pillText { fill: #475569; font: 600 14px Arial, sans-serif; }
      .pillActive { fill: #ffffff; font: 700 14px Arial, sans-serif; }
      .stageTitle { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .cardTitle { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .cardText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .mutedText { fill: #94a3b8; font: 500 15px Arial, sans-serif; }
      .noteTitle { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .noteText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="906"/>

  <text class="title" x="800" y="58" text-anchor="middle">M5 - Build a Professional Knowledge Capture Pipeline</text>
  <text class="subtitle" x="800" y="88" text-anchor="middle">Route distilled Slack and Teams context into the knowledge lane established in M4 instead of letting it disappear into chat history.</text>

  <rect x="120" y="112" width="190" height="38" rx="12" fill="#0f766e"/>
  <rect x="325" y="112" width="190" height="38" rx="12" fill="#0f766e"/>
  <rect x="530" y="112" width="190" height="38" rx="12" fill="#0f766e"/>
  <rect x="735" y="112" width="190" height="38" rx="12" fill="#0f766e"/>
  <rect x="940" y="112" width="190" height="38" rx="12" fill="#2563eb"/>
  <rect x="1145" y="112" width="190" height="38" rx="12" fill="#e2e8f0"/>
  <text class="pillActive" x="215" y="136" text-anchor="middle">M1 Foundation</text>
  <text class="pillActive" x="420" y="136" text-anchor="middle">M2 Coding Agent</text>
  <text class="pillActive" x="625" y="136" text-anchor="middle">M3 Review</text>
  <text class="pillActive" x="830" y="136" text-anchor="middle">M4 Memory</text>
  <text class="pillActive" x="1035" y="136" text-anchor="middle">M5 Knowledge</text>
  <text class="pillText" x="1240" y="136" text-anchor="middle">M6 Learning</text>

  <rect x="120" y="185" width="1360" height="92" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="120" y="185" width="420" height="40" rx="12" fill="#2563eb"/>
  <text class="stageTitle" x="150" y="211">Stage 1: Foundation Loop</text>
  <text class="cardText" x="165" y="250">Connector -&gt; orchestrator -&gt; inference -&gt; logs now runs reliably.</text>

  <rect x="120" y="295" width="1360" height="92" rx="18" fill="#ecfeff" stroke="#a5f3fc"/>
  <rect x="120" y="295" width="420" height="40" rx="12" fill="#0891b2"/>
  <text class="stageTitle" x="150" y="321">Stage 2: Sandboxed Coding Agent</text>
  <text class="cardText" x="165" y="360">OpenShell sandboxes let the orchestrator hand off coding work safely.</text>

  <rect x="120" y="405" width="1360" height="92" rx="18" fill="#fdf2f8" stroke="#f9a8d4"/>
  <rect x="120" y="405" width="420" height="40" rx="12" fill="#db2777"/>
  <text class="stageTitle" x="150" y="431">Stage 3: Review Collaboration</text>
  <text class="cardText" x="165" y="470">A review agent critiques the coding agent before output is returned or pushed.</text>

  <rect x="120" y="515" width="1360" height="170" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <rect x="120" y="515" width="420" height="40" rx="12" fill="#ea580c"/>
  <text class="stageTitle" x="150" y="541">Stage 5: Knowledge Capture</text>
  <rect x="180" y="578" width="220" height="58" rx="12" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="470" y="578" width="220" height="58" rx="12" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="760" y="578" width="280" height="58" rx="12" fill="#ffedd5" stroke="#fdba74"/>
  <rect x="1110" y="578" width="250" height="58" rx="12" fill="#ffedd5" stroke="#fdba74"/>
  <text class="cardTitle" x="290" y="601" text-anchor="middle">Slack history</text>
  <text class="cardText" x="290" y="620" text-anchor="middle">work context to distill</text>
  <text class="cardTitle" x="580" y="601" text-anchor="middle">Teams history</text>
  <text class="cardText" x="580" y="620" text-anchor="middle">meetings and chat notes</text>
  <text class="cardTitle" x="900" y="601" text-anchor="middle">Summarizer pipeline</text>
  <text class="cardText" x="900" y="620" text-anchor="middle">scrape, condense, tag, and store</text>
  <text class="cardTitle" x="1235" y="601" text-anchor="middle">Knowledge base</text>
  <text class="cardText" x="1235" y="620" text-anchor="middle">durable professional context</text>
  <path class="arrow" d="M400 607 L470 607"/>
  <path class="arrow" d="M690 607 L760 607"/>
  <path class="arrow" d="M1040 607 L1110 607"/>

  <rect x="120" y="704" width="1360" height="78" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="120" y="704" width="350" height="40" rx="12" fill="#cbd5e1"/>
  <text class="stageTitle" x="150" y="730">Stage 6: Learning Loop</text>
  <text class="mutedText" x="160" y="762">Added next: close the loop with evaluation, lessons, and skill or policy updates.</text>

  <rect x="120" y="808" width="1360" height="68" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text class="noteTitle" x="150" y="834">Why this milestone matters</text>
  <text class="noteText" x="150" y="858">Capture feeds the knowledge tier defined in M4—distinct from working and user memory—so chat-derived context stays durable and retrievable.</text>
</svg>
