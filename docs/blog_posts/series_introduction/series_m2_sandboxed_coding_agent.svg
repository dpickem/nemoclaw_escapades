  <rect x="120" y="713" width="350" height="40" rx="12" fill="#cbd5e1"/>
  <text class="stageTitle" x="150" y="739">Stages 5-6: Memory + Learning</text>
  <text class="mutedText" x="160" y="770">Added later: persistent memory orchestration and a self-improvement loop.</text>

  <rect x="120" y="818" width="1360" height="68" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text class="noteTitle" x="150" y="844">Why this milestone matters</text>
  <text class="noteText" x="150" y="870">The system can now do real work, but sandbox policies and constrained interfaces keep that power governable.</text>
