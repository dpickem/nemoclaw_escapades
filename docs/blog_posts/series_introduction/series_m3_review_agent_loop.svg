<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="924" viewBox="0 0 1600 924">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 18px Arial, sans-serif; }
      .pillText { fill: #475569; font: 600 14px Arial, sans-serif; }
      .pillActive { fill: #ffffff; font: 700 14px Arial, sans-serif; }
      .stageTitle { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .cardTitle { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .cardText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .mutedText { fill: #94a3b8; font: 500 15px Arial, sans-serif; }
      .noteTitle { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .noteText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
      .review { stroke: #db2777; stroke-width: 2.5; fill: none; marker-end: url(#reviewHead); }
    </style>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="reviewHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#db2777"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="924"/>

  <text class="title" x="800" y="58" text-anchor="middle">M3 - Add a Review Agent and a Local Critique Loop</text>
  <text class="subtitle" x="800" y="88" text-anchor="middle">The system now has two cooperating agents: one produces work and another challenges it before anything exits the workflow.</text>

  <rect x="120" y="112" width="190" height="38" rx="12" fill="#0f766e"/>
  <rect x="325" y="112" width="190" height="38" rx="12" fill="#0f766e"/>
  <rect x="530" y="112" width="190" height="38" rx="12" fill="#2563eb"/>
  <rect x="735" y="112" width="190" height="38" rx="12" fill="#e2e8f0"/>
  <rect x="940" y="112" width="190" height="38" rx="12" fill="#e2e8f0"/>
  <rect x="1145" y="112" width="190" height="38" rx="12" fill="#e2e8f0"/>
  <text class="pillActive" x="215" y="136" text-anchor="middle">M1 Foundation</text>
  <text class="pillActive" x="420" y="136" text-anchor="middle">M2 Coding Agent</text>
  <text class="pillActive" x="625" y="136" text-anchor="middle">M3 Review</text>
  <text class="pillText" x="830" y="136" text-anchor="middle">M4 Knowledge</text>
  <text class="pillText" x="1035" y="136" text-anchor="middle">M5 Memory</text>
  <text class="pillText" x="1240" y="136" text-anchor="middle">M6 Learning</text>

  <rect x="120" y="185" width="1360" height="100" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="120" y="185" width="420" height="40" rx="12" fill="#2563eb"/>
  <text class="stageTitle" x="150" y="211">Stage 1: Foundation Loop</text>
  <rect x="205" y="233" width="260" height="42" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="525" y="233" width="260" height="42" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
  <rect x="845" y="233" width="260" height="42" rx="12" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="cardTitle" x="335" y="259" text-anchor="middle">Connector</text>
  <text class="cardTitle" x="655" y="259" text-anchor="middle">Orchestrator</text>
  <text class="cardTitle" x="975" y="259" text-anchor="middle">Inference and logs</text>
  <path class="arrow" d="M465 254 L525 254"/>
  <path class="arrow" d="M785 254 L845 254"/>

  <rect x="120" y="305" width="1360" height="100" rx="18" fill="#ecfeff" stroke="#a5f3fc"/>
  <rect x="120" y="305" width="420" height="40" rx="12" fill="#0891b2"/>
  <text class="stageTitle" x="150" y="331">Stage 2: Sandboxed Coding Agent</text>
  <rect x="220" y="353" width="320" height="42" rx="12" fill="#cffafe" stroke="#67e8f9"/>
  <rect x="610" y="353" width="320" height="42" rx="12" fill="#cffafe" stroke="#67e8f9"/>
  <text class="cardTitle" x="380" y="379" text-anchor="middle">OpenShell sandbox</text>
  <text class="cardTitle" x="770" y="379" text-anchor="middle">Coding agent + tools</text>
  <path class="arrow" d="M540 374 L610 374"/>

  <rect x="120" y="425" width="1360" height="170" rx="18" fill="#fdf2f8" stroke="#f9a8d4"/>
  <rect x="120" y="425" width="420" height="40" rx="12" fill="#db2777"/>
  <text class="stageTitle" x="150" y="451">Stage 3: Review Collaboration</text>
  <rect x="190" y="487" width="250" height="56" rx="12" fill="#fce7f3" stroke="#f9a8d4"/>
  <rect x="515" y="487" width="220" height="56" rx="12" fill="#fce7f3" stroke="#f9a8d4"/>
  <rect x="810" y="487" width="250" height="56" rx="12" fill="#fce7f3" stroke="#f9a8d4"/>
  <rect x="1135" y="487" width="220" height="56" rx="12" fill="#fce7f3" stroke="#f9a8d4"/>
  <text class="cardTitle" x="315" y="510" text-anchor="middle">Coding agent</text>
  <text class="cardText" x="315" y="529" text-anchor="middle">produces candidate change</text>
  <text class="cardTitle" x="625" y="510" text-anchor="middle">Patch or diff</text>
  <text class="cardText" x="625" y="529" text-anchor="middle">artifact to inspect</text>
  <text class="cardTitle" x="935" y="510" text-anchor="middle">Review agent</text>
  <text class="cardText" x="935" y="529" text-anchor="middle">critique or approve</text>
  <text class="cardTitle" x="1245" y="510" text-anchor="middle">Approved output</text>
  <text class="cardText" x="1245" y="529" text-anchor="middle">safe to return</text>
  <path class="arrow" d="M440 515 L515 515"/>
  <path class="arrow" d="M735 515 L810 515"/>
  <path class="arrow" d="M1060 515 L1135 515"/>
  <path class="review" d="M935 543 L935 570 L315 570 L315 543"/>

  <rect x="120" y="622" width="1360" height="78" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="120" y="622" width="285" height="40" rx="12" fill="#cbd5e1"/>
  <text class="stageTitle" x="150" y="648">Stage 4: Knowledge Capture</text>
  <text class="mutedText" x="160" y="680">Added next: summarize external context into a professional knowledge base.</text>

  <rect x="120" y="726" width="1360" height="78" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="120" y="726" width="350" height="40" rx="12" fill="#cbd5e1"/>
  <text class="stageTitle" x="150" y="752">Stages 5-6: Memory + Learning</text>
  <text class="mutedText" x="160" y="784">Added later: persistent memory orchestration and a self-improvement loop.</text>

  <rect x="120" y="826" width="1360" height="68" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <text class="noteTitle" x="150" y="852">Why this milestone matters</text>
  <text class="noteText" x="150" y="876">Work is now improved before it leaves the workflow, creating the first real multi-agent collaboration pattern.</text>
</svg>
