<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 18px Arial, sans-serif; }
      .stageTitle { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .cardTitle { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .cardText { fill: #334155; font: 500 14px Arial, sans-serif; }
      .noteText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .compLabel { fill: #475569; font: 600 13px Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#blueHead); }
      .arrowPurple { stroke: #7c3aed; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#purpleHead); }
      .arrowOrange { stroke: #ea580c; stroke-width: 2; fill: none; marker-end: url(#orangeHead); }
    </style>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="blueHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="purpleHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="orangeHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ea580c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="700"/>

  <text class="title" x="800" y="50" text-anchor="middle">NMB Architecture Overview</text>
  <text class="subtitle" x="800" y="80" text-anchor="middle">WebSocket broker with proxy-trusted identity, star topology, and async audit</text>

  <!-- Sandbox boxes (left and right) -->
  <!-- Orchestrator sandbox -->
  <rect x="80" y="120" width="380" height="280" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="80" y="120" width="260" height="40" rx="12" fill="#2563eb"/>
  <text class="stageTitle" x="110" y="146">Orchestrator Sandbox</text>

  <rect x="110" y="180" width="320" height="80" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="cardTitle" x="270" y="210" text-anchor="middle">MessageBus</text>
  <text class="cardText" x="270" y="234" text-anchor="middle">send, request, subscribe, stream</text>

  <rect x="110" y="280" width="320" height="92" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <text class="cardTitle" x="270" y="310" text-anchor="middle">Agent Logic</text>
  <text class="cardText" x="270" y="334" text-anchor="middle">task dispatch, progress tracking,</text>
  <text class="cardText" x="270" y="354" text-anchor="middle">review coordination</text>

  <!-- Coding sandbox -->
  <rect x="80" y="430" width="380" height="180" rx="18" fill="#f5f3ff" stroke="#c4b5fd"/>
  <rect x="80" y="430" width="260" height="40" rx="12" fill="#7c3aed"/>
  <text class="stageTitle" x="110" y="456">Coding Sandbox</text>

  <rect x="110" y="490" width="320" height="80" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="270" y="520" text-anchor="middle">MessageBus</text>
  <text class="cardText" x="270" y="544" text-anchor="middle">listen, reply, publish, stream</text>

  <!-- Review sandbox -->
  <rect x="1140" y="430" width="380" height="180" rx="18" fill="#fdf4ff" stroke="#e9d5ff"/>
  <rect x="1140" y="430" width="260" height="40" rx="12" fill="#9333ea"/>
  <text class="stageTitle" x="1170" y="456">Review Sandbox</text>

  <rect x="1170" y="490" width="320" height="80" rx="14" fill="#f3e8ff" stroke="#e9d5ff"/>
  <text class="cardTitle" x="1330" y="520" text-anchor="middle">MessageBus</text>
  <text class="cardText" x="1330" y="544" text-anchor="middle">listen, reply, publish</text>

  <!-- Central broker -->
  <rect x="560" y="160" width="480" height="380" rx="18" fill="#f0fdf4" stroke="#bbf7d0"/>
  <rect x="560" y="160" width="320" height="40" rx="12" fill="#16a34a"/>
  <text class="stageTitle" x="590" y="186">NMB Broker (messages.local:9876)</text>

  <rect x="590" y="220" width="420" height="70" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <text class="cardTitle" x="800" y="250" text-anchor="middle">Connection Registry</text>
  <text class="cardText" x="800" y="270" text-anchor="middle">sandbox_id &#8594; WebSocket mapping</text>

  <rect x="590" y="304" width="200" height="70" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <text class="cardTitle" x="690" y="334" text-anchor="middle">Message Router</text>
  <text class="cardText" x="690" y="354" text-anchor="middle">P2P + request-reply</text>

  <rect x="810" y="304" width="200" height="70" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <text class="cardTitle" x="910" y="334" text-anchor="middle">Channel Manager</text>
  <text class="cardText" x="910" y="354" text-anchor="middle">pub/sub fanout</text>

  <rect x="590" y="388" width="200" height="70" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <text class="cardTitle" x="690" y="418" text-anchor="middle">Pending Requests</text>
  <text class="cardText" x="690" y="438" text-anchor="middle">timeout tracking</text>

  <rect x="810" y="388" width="200" height="70" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <text class="cardTitle" x="910" y="418" text-anchor="middle">Identity Layer</text>
  <text class="cardText" x="910" y="438" text-anchor="middle">X-Sandbox-ID trust</text>

  <rect x="590" y="472" width="420" height="50" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <text class="cardTitle" x="800" y="502" text-anchor="middle">Audit DB (async batched writes &#8594; SQLite)</text>

  <!-- WebSocket connections -->
  <path class="arrowBlue" d="M430 220 L560 250"/>
  <text class="compLabel" x="468" y="220" fill="#2563eb">ws://</text>

  <path class="arrowPurple" d="M430 530 L560 480"/>
  <text class="compLabel" x="468" y="518" fill="#7c3aed">ws://</text>

  <path class="arrowPurple" d="M1140 530 L1040 480"/>
  <text class="compLabel" x="1068" y="518" fill="#9333ea">ws://</text>

  <!-- Proxy layer -->
  <rect x="1140" y="120" width="380" height="280" rx="18" fill="#fff7ed" stroke="#fdba74"/>
  <rect x="1140" y="120" width="280" height="40" rx="12" fill="#ea580c"/>
  <text class="stageTitle" x="1170" y="146">OpenShell Proxy Layer</text>

  <rect x="1170" y="180" width="320" height="80" rx="14" fill="#ffedd5" stroke="#fdba74"/>
  <text class="cardTitle" x="1330" y="210" text-anchor="middle">HTTPS Proxy</text>
  <text class="cardText" x="1330" y="234" text-anchor="middle">Network policy enforcement</text>

  <rect x="1170" y="280" width="320" height="92" rx="14" fill="#ffedd5" stroke="#fdba74"/>
  <text class="cardTitle" x="1330" y="310" text-anchor="middle">Identity Injection</text>
  <text class="cardText" x="1330" y="334" text-anchor="middle">X-Sandbox-ID header added by proxy</text>
  <text class="cardText" x="1330" y="354" text-anchor="middle">Broker overwrites from_sandbox</text>

  <path class="arrowOrange" d="M1040 260 L1170 230"/>
  <text class="compLabel" x="1070" y="238" fill="#ea580c">policy check</text>

  <!-- Legend -->
  <rect x="80" y="638" width="1440" height="44" rx="18" fill="#e2e8f0"/>
  <line x1="110" y1="660" x2="160" y2="660" stroke="#2563eb" stroke-width="2.5"/>
  <text class="compLabel" x="170" y="664">WebSocket (data)</text>
  <line x1="340" y1="660" x2="390" y2="660" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text class="compLabel" x="400" y="664">WebSocket (reply)</text>
  <line x1="570" y1="660" x2="620" y2="660" stroke="#ea580c" stroke-width="2"/>
  <text class="compLabel" x="630" y="664">Proxy enforcement</text>
  <text class="noteText" x="1000" y="664">Star topology: all sandbox communication flows through the broker</text>
</svg>
