<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 500 18px Arial, sans-serif; }
      .stageTitle { fill: #ffffff; font: 700 18px Arial, sans-serif; }
      .cardTitle { fill: #0f172a; font: 700 16px Arial, sans-serif; }
      .cardText { fill: #334155; font: 500 14px Arial, sans-serif; }
      .noteText { fill: #334155; font: 500 15px Arial, sans-serif; }
      .stepNum { fill: #ffffff; font: 700 16px Arial, sans-serif; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
      .arrowBlue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#blueHead); }
      .arrowGreen { stroke: #16a34a; stroke-width: 2.5; fill: none; marker-end: url(#greenHead); }
      .arrowErr { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 6 4; marker-end: url(#errHead); }
      .arrowOrange { stroke: #ea580c; stroke-width: 2; fill: none; marker-end: url(#orangeHead); }
    </style>
    <marker id="arrowHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="blueHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="greenHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="errHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
    <marker id="orangeHead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ea580c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="720"/>

  <text class="title" x="800" y="46" text-anchor="middle">Broker Dispatch Pipeline</text>
  <text class="subtitle" x="800" y="74" text-anchor="middle">Every inbound frame follows the same path: parse &#8594; authenticate &#8594; validate &#8594; route &#8594; audit</text>

  <!-- Main pipeline -->
  <rect x="80" y="100" width="1440" height="200" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="80" y="100" width="300" height="40" rx="12" fill="#2563eb"/>
  <text class="stageTitle" x="110" y="126">Inbound Frame Processing</text>

  <!-- Step 1: Parse -->
  <rect x="110" y="160" width="190" height="110" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <circle cx="134" cy="186" r="14" fill="#2563eb"/>
  <text class="stepNum" x="134" y="191" text-anchor="middle">1</text>
  <text class="cardTitle" x="155" y="186">Parse JSON</text>
  <text class="cardText" x="120" y="214">Deserialize frame</text>
  <text class="cardText" x="120" y="234">into NMBMessage</text>
  <text class="cardText" x="120" y="254">via Pydantic</text>

  <!-- Step 2: Authenticate -->
  <rect x="340" y="160" width="210" height="110" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <circle cx="364" cy="186" r="14" fill="#2563eb"/>
  <text class="stepNum" x="364" y="191" text-anchor="middle">2</text>
  <text class="cardTitle" x="385" y="186">Authenticate</text>
  <text class="cardText" x="350" y="214">Overwrite from_sandbox</text>
  <text class="cardText" x="350" y="234">with connection's</text>
  <text class="cardText" x="350" y="254">X-Sandbox-ID</text>

  <!-- Step 3: Validate -->
  <rect x="590" y="160" width="210" height="110" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
  <circle cx="614" cy="186" r="14" fill="#2563eb"/>
  <text class="stepNum" x="614" y="191" text-anchor="middle">3</text>
  <text class="cardTitle" x="635" y="186">Validate</text>
  <text class="cardText" x="600" y="214">Check required fields</text>
  <text class="cardText" x="600" y="234">per op type</text>
  <text class="cardText" x="600" y="254">Enforce payload limit</text>

  <!-- Step 4: Route -->
  <rect x="840" y="160" width="210" height="110" rx="14" fill="#e0e7ff" stroke="#a5b4fc"/>
  <circle cx="864" cy="186" r="14" fill="#2563eb"/>
  <text class="stepNum" x="864" y="191" text-anchor="middle">4</text>
  <text class="cardTitle" x="885" y="186">Route</text>
  <text class="cardText" x="850" y="214">Dispatch to handler</text>
  <text class="cardText" x="850" y="234">by op: send, request,</text>
  <text class="cardText" x="850" y="254">reply, subscribe, ...</text>

  <!-- Step 5: ACK + Audit -->
  <rect x="1090" y="160" width="210" height="110" rx="14" fill="#dcfce7" stroke="#bbf7d0"/>
  <circle cx="1114" cy="186" r="14" fill="#16a34a"/>
  <text class="stepNum" x="1114" y="191" text-anchor="middle">5</text>
  <text class="cardTitle" x="1135" y="186">ACK + Audit</text>
  <text class="cardText" x="1100" y="214">Send ack to sender</text>
  <text class="cardText" x="1100" y="234">Enqueue to audit DB</text>
  <text class="cardText" x="1100" y="254">(non-blocking batch)</text>

  <!-- Arrows -->
  <path class="arrowBlue" d="M300 215 L340 215"/>
  <path class="arrowBlue" d="M550 215 L590 215"/>
  <path class="arrowBlue" d="M800 215 L840 215"/>
  <path class="arrowGreen" d="M1050 215 L1090 215"/>

  <!-- Error path -->
  <path class="arrowErr" d="M695 270 L695 320"/>
  <text class="cardText" x="710" y="312" fill="#dc2626">validation error</text>

  <rect x="580" y="320" width="240" height="48" rx="12" fill="#fee2e2" stroke="#fecaca"/>
  <text class="cardTitle" x="700" y="350" text-anchor="middle">Send error frame</text>

  <!-- Handler dispatch detail -->
  <rect x="80" y="400" width="1440" height="280" rx="18" fill="#f5f3ff" stroke="#c4b5fd"/>
  <rect x="80" y="400" width="340" height="40" rx="12" fill="#7c3aed"/>
  <text class="stageTitle" x="110" y="426">Handler Dispatch (Step 4 Detail)</text>

  <!-- send handler -->
  <rect x="110" y="460" width="210" height="100" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="215" y="488" text-anchor="middle">_handle_send</text>
  <text class="cardText" x="120" y="512">Lookup to_sandbox</text>
  <text class="cardText" x="120" y="532">Deliver or TARGET_OFFLINE</text>
  <text class="cardText" x="120" y="552">ACK sender + audit</text>

  <!-- request handler -->
  <rect x="340" y="460" width="210" height="100" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="445" y="488" text-anchor="middle">_handle_request</text>
  <text class="cardText" x="350" y="512">Register pending + timer</text>
  <text class="cardText" x="350" y="532">Deliver to target</text>
  <text class="cardText" x="350" y="552">Track for timeout</text>

  <!-- reply handler -->
  <rect x="570" y="460" width="210" height="100" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="675" y="488" text-anchor="middle">_handle_reply</text>
  <text class="cardText" x="580" y="512">Pop pending request</text>
  <text class="cardText" x="580" y="532">Cancel timeout task</text>
  <text class="cardText" x="580" y="552">Deliver to requester</text>

  <!-- publish handler -->
  <rect x="800" y="460" width="210" height="100" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="905" y="488" text-anchor="middle">_handle_publish</text>
  <text class="cardText" x="810" y="512">Build deliver JSON once</text>
  <text class="cardText" x="810" y="532">Fanout with gather()</text>
  <text class="cardText" x="810" y="552">Skip publisher</text>

  <!-- subscribe handler -->
  <rect x="1030" y="460" width="210" height="100" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="1135" y="488" text-anchor="middle">_handle_subscribe</text>
  <text class="cardText" x="1040" y="512">Check channel limit</text>
  <text class="cardText" x="1040" y="532">Add to channel map</text>
  <text class="cardText" x="1040" y="552">ACK subscription</text>

  <!-- stream handler -->
  <rect x="1260" y="460" width="210" height="100" rx="14" fill="#ede9fe" stroke="#c4b5fd"/>
  <text class="cardTitle" x="1365" y="488" text-anchor="middle">_handle_stream</text>
  <text class="cardText" x="1270" y="512">Forward chunk as</text>
  <text class="cardText" x="1270" y="532">deliver to target</text>
  <text class="cardText" x="1270" y="552">Preserve seq + done</text>

  <!-- Audit side-channel -->
  <rect x="110" y="590" width="1360" height="44" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text class="cardText" x="790" y="618" text-anchor="middle">Every handler enqueues to the AuditDB background writer &#8212; routing never blocks on disk I/O</text>

  <!-- Bottom note -->
  <rect x="80" y="694" width="1440" height="22" rx="10" fill="#e2e8f0"/>
  <text class="noteText" x="800" y="710" text-anchor="middle">The broker is a pure router &#8212; it never inspects payloads, never calls inference, and never accesses the filesystem</text>
</svg>
