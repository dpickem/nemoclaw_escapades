<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; }
      .dText { fill: #ffffff; font: 600 14px Arial, sans-serif; }
      .tText { fill: #ffffff; font: 700 14px Arial, sans-serif; }
      .tSub { fill: #ffffffcc; font: 400 12px Arial, sans-serif; }
      .lbl { fill: #dc2626; font: 700 13px Arial, sans-serif; }
      .edge { fill: #475569; font: 700 13px Arial, sans-serif; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#ah); }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="620"/>

  <text class="title" x="450" y="42" text-anchor="middle">Hosting Decision Tree</text>

  <path d="M450 60 L610 100 L450 140 L290 100 Z" fill="#1e293b"/>
  <text class="dText" x="450" y="96" text-anchor="middle">Need always-on</text>
  <text class="dText" x="450" y="112" text-anchor="middle">agent?</text>

  <path class="arrow" d="M610 100 L730 100"/>
  <text class="edge" x="660" y="92">NO</text>

  <rect x="732" y="76" width="148" height="48" rx="10" fill="#0891b2"/>
  <text class="tText" x="806" y="97" text-anchor="middle">Local dev</text>
  <text class="tSub" x="806" y="113" text-anchor="middle">(laptop)</text>

  <path class="arrow" d="M450 140 L450 200"/>
  <text class="edge" x="460" y="176">YES</text>

  <path d="M450 200 L610 240 L450 280 L290 240 Z" fill="#1e293b"/>
  <text class="dText" x="450" y="236" text-anchor="middle">Handles</text>
  <text class="dText" x="450" y="252" text-anchor="middle">company IP?</text>

  <path class="arrow" d="M610 240 L730 240"/>
  <text class="edge" x="660" y="232">NO</text>

  <rect x="732" y="212" width="148" height="56" rx="10" fill="#d97706"/>
  <text class="tText" x="806" y="236" text-anchor="middle">NVIDIA Brev</text>
  <text class="tSub" x="806" y="254" text-anchor="middle">personal only</text>

  <path class="arrow" d="M450 280 L450 340"/>
  <text class="edge" x="460" y="316">YES</text>

  <rect x="296" y="342" width="308" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text class="lbl" x="450" y="362" text-anchor="middle">Work-approved platforms only</text>

  <path class="arrow" d="M450 372 L450 390"/>

  <path d="M450 390 L610 430 L450 470 L290 430 Z" fill="#1e293b"/>
  <text class="dText" x="450" y="426" text-anchor="middle">On-prem</text>
  <text class="dText" x="450" y="442" text-anchor="middle">or cloud?</text>

  <path class="arrow" d="M290 430 L170 430 L170 502"/>
  <text class="edge" x="200" y="422">On-prem</text>

  <rect x="70" y="504" width="200" height="68" rx="12" fill="#16a34a"/>
  <text class="tText" x="170" y="532" text-anchor="middle">DGX Spark /</text>
  <text class="tText" x="170" y="550" text-anchor="middle">DGX Station</text>
  <text class="tSub" x="170" y="566" text-anchor="middle">on-premises</text>

  <path class="arrow" d="M610 430 L730 430 L730 502"/>
  <text class="edge" x="650" y="422">Cloud</text>

  <rect x="630" y="504" width="200" height="68" rx="12" fill="#7c3aed"/>
  <text class="tText" x="730" y="532" text-anchor="middle">DGX Cloud /</text>
  <text class="tText" x="730" y="550" text-anchor="middle">Corp VM</text>
  <text class="tSub" x="730" y="566" text-anchor="middle">enterprise cloud</text>
</svg>
