# Orchestrator Sandbox Policy
#
# Defines what the orchestrator sandbox is allowed to do inside OpenShell.
# The orchestrator and Slack connector run together in a single sandbox.
#
# Schema reference:
#   https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# Based on the NemoClaw OpenClaw sandbox policy:
#   https://github.com/NVIDIA/NemoClaw/blob/main/nemoclaw-blueprint/policies/openclaw-sandbox.yaml
#
# Defines what the orchestrator sandbox is allowed to do inside OpenShell.
# The orchestrator and Slack connector run together in a single sandbox.
#
# Schema reference:
#   https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# Based on the NemoClaw OpenClaw sandbox policy:
#   https://github.com/NVIDIA/NemoClaw/blob/main/nemoclaw-blueprint/policies/openclaw-sandbox.yaml
#
# Defines what the orchestrator sandbox is allowed to do inside OpenShell.
# The orchestrator and Slack connector run together in a single sandbox.
#
# Schema reference:
#   https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# Based on the NemoClaw OpenClaw sandbox policy:
#   https://github.com/NVIDIA/NemoClaw/blob/main/nemoclaw-blueprint/policies/openclaw-sandbox.yaml
#
# Quick guide:
#   - "Static" fields (filesystem_policy, landlock, process) require sandbox
#     recreation.
#   - "Dynamic" fields (network_policies) can be hot-reloaded:
#     openshell policy set orchestrator --policy policies/orchestrator.yaml
#   - protocol: rest  — proxy intercepts HTTP, resolves credential
#     placeholders, and enforces method/path rules.
#   - access: full    — permits CONNECT tunnels.  For internal hosts
#     (RFC 1918), pair with allowed_ips to bypass SSRF protection.
#   - allowed_ips     — CIDR list to exempt from the proxy's internal-IP
#     block (SSRF protection).  Required for hosts on 10.x.x.x.
#
# Reference: https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# SSRF docs: https://docs.nvidia.com/openshell/latest/security/best-practices#ssrf-protection

# ---------------------------------------------------------------------------
# YAML anchors — reusable definitions referenced with *alias below
# ---------------------------------------------------------------------------

# NVIDIA internal subnets that host GitLab, Gerrit, and related services.
# Required because the OpenShell proxy blocks CONNECT to RFC 1918 IPs by
# default (SSRF protection).  Scope these as narrowly as possible.
_nvidia_internal_ips: &nvidia_internal_ips
  - 10.120.176.0/24     # git-av (Gerrit)
  - 10.120.180.0/24     # gitlab-master (primary)
  - 10.120.189.0/24     # gitlab-master (secondary)

version: 1

# ---------------------------------------------------------------------------
# Filesystem Policy (Static)
# ---------------------------------------------------------------------------
filesystem_policy:
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app/src
    - /etc
  read_write:
    - /app/logs
    - /app/prompts
    - /tmp
    - /dev/null
    - /app/.config

# ---------------------------------------------------------------------------
# Landlock (Static)
# ---------------------------------------------------------------------------
landlock:
  compatibility: best_effort

# ---------------------------------------------------------------------------
# Process (Static)
# ---------------------------------------------------------------------------
process:
  run_as_user: sandbox
  run_as_group: sandbox

# ---------------------------------------------------------------------------
# Network Policies (Dynamic — hot-reloadable)
# ---------------------------------------------------------------------------
network_policies:
  # Slack HTTP API — auth.test, chat.postMessage, apps.connections.open, etc.
  # protocol: rest + tls: terminate lets the proxy intercept HTTPS, resolve
  # credential placeholders in Authorization headers, and enforce HTTP rules.
  slack_api:
    name: slack-api
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  # Slack WebSocket — Socket Mode uses a long-lived WebSocket after the
  # initial apps.connections.open handshake. access: full uses a CONNECT
  # tunnel which avoids the proxy's HTTP idle timeout killing the connection.
  slack_websocket:
    name: slack-websocket
    endpoints:
      - host: "*.slack.com"
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/python* }

  # NVIDIA Inference Hub — routed through OpenShell's inference proxy.
  # The app sends requests to https://inference.local/v1, the proxy
  # resolves the credential placeholder and forwards to the real
  # inference endpoint configured via `openshell inference set`.
  # Direct access to the upstream inference endpoint is blocked by the proxy;
  # all inference traffic MUST go through inference.local.
  inference:
    name: inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  # -----------------------------------------------------------------------
  # Service API endpoints
  #
  # Known limitation: OpenShell blocks CONNECT tunnels to RFC 1918
  # addresses (10.x.x.x).  Services behind Akamai/CDN (Jira, Confluence)
  # resolve to public IPs and work.  Purely internal services (GitLab at
  # 10.120.x.x, Gerrit at 10.120.x.x) are blocked in the sandbox.
  # They work fine via `make run-local-dev` (no proxy).
  # -----------------------------------------------------------------------

  jira:
    name: jira
    endpoints:
      - host: jirasw.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  confluence:
    name: confluence
    endpoints:
      - host: nvidia.atlassian.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  gitlab:
    name: gitlab
    endpoints:
      - host: gitlab-master.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        allowed_ips: *nvidia_internal_ips
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  gerrit:
    name: gerrit
    endpoints:
      - host: git-av.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        allowed_ips: *nvidia_internal_ips
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  # Slack user API — uses the user OAuth token (SLACK_USER_TOKEN / xoxp-...),
  # distinct from the bot token used by the connector.  Shares the same
  # slack.com endpoint but is a separate policy entry so it can be
  # independently disabled.
  slack_user_api:
    name: slack-user-api
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }
