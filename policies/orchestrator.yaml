# Orchestrator Sandbox Policy
#
# Defines what the orchestrator sandbox is allowed to do inside OpenShell.
# The orchestrator and Slack connector run together in a single sandbox.
#
# This is the BASE policy committed to the repo.  It is public-safe
# and therefore contains **no category-B values**:
#   - No internal hostnames (the `gitlab` / `gerrit` endpoint.host
#     fields ship as empty placeholders; `scripts/gen_policy.py`
#     substitutes real hosts from `.env`'s `GITLAB_URL` / `GERRIT_URL`
#     at build time).
#   - No `allowed_ips` for the SSRF-bypassed policies (injected the
#     same way from `.env`'s `ALLOWED_IPS` +
#     `ENDPOINTS_NEEDING_ALLOWED_IPS`).
# Mirrors the `config/defaults.yaml` + `scripts/gen_config.py` pattern
# described in `docs/design_m2b.md` §5.3.
#
# Schema reference:
#   https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# Based on the NemoClaw OpenClaw sandbox policy:
#   https://github.com/NVIDIA/NemoClaw/blob/main/nemoclaw-blueprint/policies/openclaw-sandbox.yaml
#
# To generate the resolved policy with hostnames + allowed_ips from .env:
#   make gen-policy        # writes policies/orchestrator.resolved.yaml
#   make setup-sandbox     # runs gen-policy automatically
#
# Quick guide:
#   - "Static" fields (filesystem_policy, landlock, process) require sandbox
#     recreation.
#   - "Dynamic" fields (network_policies) can be hot-reloaded:
#     openshell policy set orchestrator --policy policies/orchestrator.resolved.yaml
#   - protocol: rest  — proxy intercepts HTTP, resolves credential
#     placeholders, and enforces method/path rules.
#   - access: full    — permits CONNECT tunnels.  For internal hosts
#     (RFC 1918), pair with allowed_ips to bypass SSRF protection.
#
# Reference: https://docs.nvidia.com/openshell/latest/reference/policy-schema.html
# SSRF docs: https://docs.nvidia.com/openshell/latest/security/best-practices#ssrf-protection

version: 1

# ---------------------------------------------------------------------------
# Filesystem Policy (Static)
# ---------------------------------------------------------------------------
filesystem_policy:
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app/src
    - /app/config.yaml  # resolved sandbox config (built from config/defaults.yaml + .env)
    - /etc
  read_write:
    - /app/logs
    - /app/prompts
    - /tmp
    - /dev/null
    - /app/.config
    - /sandbox          # PVC-backed persistent storage (OpenShell >= 0.0.22)

# ---------------------------------------------------------------------------
# Landlock (Static)
# ---------------------------------------------------------------------------
landlock:
  compatibility: best_effort

# ---------------------------------------------------------------------------
# Process (Static)
# ---------------------------------------------------------------------------
process:
  run_as_user: sandbox
  run_as_group: sandbox

# ---------------------------------------------------------------------------
# Network Policies (Dynamic — hot-reloadable)
# ---------------------------------------------------------------------------
network_policies:
  # Slack HTTP API — auth.test, chat.postMessage, apps.connections.open, etc.
  # protocol: rest + tls: terminate lets the proxy intercept HTTPS, resolve
  # credential placeholders in Authorization headers, and enforce HTTP rules.
  slack_api:
    name: slack-api
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  # Slack WebSocket — Socket Mode uses a long-lived WebSocket after the
  # initial apps.connections.open handshake. access: full uses a CONNECT
  # tunnel which avoids the proxy's HTTP idle timeout killing the connection.
  slack_websocket:
    name: slack-websocket
    endpoints:
      - host: "*.slack.com"
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/python* }

  # NVIDIA Inference Hub — routed through OpenShell's inference proxy.
  # The app sends requests to https://inference.local/v1, the proxy
  # resolves the credential placeholder and forwards to the real
  # inference endpoint configured via `openshell inference set`.
  # Direct access to the upstream inference endpoint is blocked by the proxy;
  # all inference traffic MUST go through inference.local.
  inference:
    name: inference
    endpoints:
      - host: inference.local
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  # -----------------------------------------------------------------------
  # Service API endpoints
  #
  # Internal hosts (GitLab, Gerrit) resolve to RFC 1918 IPs.  The proxy
  # blocks these by default (SSRF protection).  The `gen_policy.py`
  # script performs two resolve-time substitutions on the entries below:
  #   1. `endpoint.host: ""` placeholders get filled from `.env`'s
  #      `GITLAB_URL` / `GERRIT_URL` (category-B non-secret config).
  #   2. `allowed_ips` is injected for every hostname listed in
  #      `ENDPOINTS_NEEDING_ALLOWED_IPS`, using the CIDRs in
  #      `ALLOWED_IPS`.
  # -----------------------------------------------------------------------

  jira:
    name: jira
    endpoints:
      - host: jirasw.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  confluence:
    name: confluence
    endpoints:
      - host: nvidia.atlassian.net
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PUT, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }

  gitlab:
    name: gitlab
    endpoints:
      # host: "" is a category-B placeholder — `gen_policy.py` rewrites
      # this with the hostname from `.env`'s `GITLAB_URL` at build time.
      # Leaving it empty (no `.env` / OSS consumer) means the policy is
      # fail-closed: OpenShell rejects an empty host on apply.
      - host: ""
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        # allowed_ips: injected by gen_policy.py from ALLOWED_IPS in .env
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }
      # Allow the coding agent's git_clone / git_checkout tools to reach
      # this host over HTTPS.  Authenticated clones need credentials in
      # .gitconfig or via a helper — the L7 proxy's credential-placeholder
      # resolver only applies to HTTP headers in requests from the other
      # whitelisted binaries.
      - { path: /usr/bin/git }

  gerrit:
    name: gerrit
    endpoints:
      # See `gitlab` above — `gen_policy.py` fills this from `GERRIT_URL`.
      - host: ""
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
        # allowed_ips: injected by gen_policy.py from ALLOWED_IPS in .env
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }
      # See gitlab policy above for the rationale on ``git``.
      - { path: /usr/bin/git }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }
      # See gitlab policy above for the rationale on ``git``.
      - { path: /usr/bin/git }

  # Slack user API — uses the user OAuth token (SLACK_USER_TOKEN / xoxp-...),
  # distinct from the bot token used by the connector.  Shares the same
  # slack.com endpoint but is a separate policy entry so it can be
  # independently disabled.
  slack_user_api:
    name: slack-user-api
    endpoints:
      - host: slack.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/python* }
      - { path: /usr/bin/curl }
