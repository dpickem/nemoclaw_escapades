# Prototype NMB broker sandbox policy.
#
# This sandbox hosts the WebSocket broker on 0.0.0.0:9876 and also runs a
# tiny orchestrator-side smoke peer that connects to the broker over loopback.
version: 1

filesystem_policy:
  read_only:
    - /usr
    - /lib
    - /etc
    - /proc
    - /dev/urandom
    - /app
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  nmb_loopback:
    name: nmb-broker-loopback
    endpoints:
      - host: 127.0.0.1
        port: 9876
        access: full
      - host: localhost
        port: 9876
        access: full
    binaries:
      - path: /usr/local/bin/python*

